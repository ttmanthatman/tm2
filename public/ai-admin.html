<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 角色管理 · TeamChat</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif; background: #f5f6f8; color: #222; }
  header { background: #667eea; color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { margin: 0; font-size: 16px; font-weight: 500; }
  header .meta { font-size: 12px; opacity: .9; }
  main { max-width: 1100px; margin: 20px auto; padding: 0 16px 80px; }
  .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .card h2 { margin: 0 0 10px; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card h2 .dot { width: 8px; height: 8px; border-radius: 50%; background: #bbb; display: inline-block; }
  .card h2 .dot.on { background: #22c55e; }
  .card h2 .dot.off { background: #ef4444; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .row label { font-size: 12px; color: #666; }
  input[type=text], textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font: inherit; font-family: "SF Mono",Consolas,monospace; }
  textarea { resize: vertical; min-height: 200px; font-size: 12px; line-height: 1.5; }
  button { padding: 7px 14px; background: #667eea; color: #fff; border: 0; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button.sec { background: #e5e7eb; color: #222; }
  button.danger { background: #ef4444; }
  button.ghost { background: transparent; color: #667eea; border: 1px solid #667eea; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #eef; color: #667eea; }
  .badge.off { background: #fee; color: #c33; }
  .logs { max-height: 300px; overflow-y: auto; background: #0f172a; color: #a5f3fc; font: 12px/1.5 "SF Mono",Consolas,monospace; padding: 10px; border-radius: 6px; }
  .logs .l { display: block; white-space: pre-wrap; word-break: break-all; border-bottom: 1px solid #1e293b; padding: 4px 0; }
  .logs .l.err { color: #fda4af; }
  .alert { padding: 10px 12px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
  .alert.warn { background: #fef3c7; color: #92400e; }
  .alert.err { background: #fee2e2; color: #991b1b; }
  .alert.ok { background: #d1fae5; color: #065f46; }
  .hint { color: #888; font-size: 12px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: #ddd center/cover; display: inline-block; vertical-align: middle; }
  a { color: #667eea; text-decoration: none; }
  .sched-card { background:#f8f9fb; border:1px solid #e5e7eb; border-radius:8px; padding:12px; margin:10px 0; }
  .sched-card h3 { margin:0 0 10px; font-size:13px; font-weight:600; color:#444; }
  .sched-tz { display:flex; align-items:center; gap:8px; margin-bottom:10px; font-size:13px; }
  .sched-tz select { padding:4px 8px; border:1px solid #ccc; border-radius:4px; font:inherit; }
  .sched-win { display:flex; align-items:center; gap:8px; padding:8px; background:#fff; border:1px solid #e5e7eb; border-radius:6px; margin-bottom:6px; flex-wrap:wrap; }
  .sched-days { display:inline-flex; gap:4px; }
  .sched-day { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:#e5e7eb; color:#666; font-size:12px; cursor:pointer; user-select:none; transition:all .15s; }
  .sched-day.on { background:#667eea; color:#fff; }
  .sched-time { display:inline-flex; align-items:center; gap:4px; font-size:12px; color:#666; }
  .sched-time input[type=time] { padding:3px 6px; border:1px solid #ccc; border-radius:4px; font:inherit; font-family:inherit; }
  .sched-del { background:transparent; color:#c33; border:0; cursor:pointer; font-size:18px; padding:0 4px; }
  .sched-add { background:transparent; color:#667eea; border:1px dashed #667eea; padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; margin-top:4px; }
  .sched-hint { font-size:11px; color:#888; margin-top:6px; }
  .sched-on-now { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; background:#d1fae5; color:#065f46; margin-left:6px; }
  .sched-off-now { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; background:#fee; color:#c33; margin-left:6px; }
  .typing-card { background:#f8f9fb; border:1px solid #e5e7eb; border-radius:8px; padding:12px; margin:10px 0; }
  .typing-card h3 { margin:0 0 10px; font-size:13px; font-weight:600; color:#444; }
  .typing-row { display:flex; gap:10px; align-items:center; margin-bottom:6px; font-size:12px; color:#555; flex-wrap:wrap; }
  .typing-row label { min-width:110px; }
  .typing-row input[type=number] { width:60px; padding:3px 6px; border:1px solid #ccc; border-radius:4px; font:inherit; }
  .typing-row .sep { color:#999; }
</style>
</head>
<body>

<header>
  <h1>🤖 AI 角色管理</h1>
  <div class="meta">
    <span id="status">加载中…</span>
    &nbsp;·&nbsp; <a href="/" style="color:#fff">← 返回聊天</a>
  </div>
</header>

<main>
  <div id="alerts"></div>
<div class="card">
    <h2>🔑 DeepSeek API Key</h2>
    <div id="key-status" class="hint" style="margin-bottom:8px">加载中…</div>
    <div class="row">
      <input type="password" id="key-input" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    </div>
    <div class="row">
      <button onclick="saveKey()">保存 Key</button>
      <button class="sec" onclick="testKey()">测试连通</button>
      <button class="danger" onclick="clearKey()" style="margin-left:auto">清空 Key</button>
    </div>
    <div class="hint" style="margin-top:6px">
      key 只会显示掩码（前4后4），明文仅服务器存储。保存后立即生效，无需重启。
      <a href="https://platform.deepseek.com/api_keys" target="_blank" rel="noopener">获取 DeepSeek Key</a>
    </div>
  </div>
  <div class="card">
    <h2>🐞 调试开关</h2>
    <div class="row">
      <label style="flex:1">
        <input type="checkbox" id="debug-toggle" onchange="toggleDebug(this.checked)">
        打印每次 DeepSeek 调用的完整 messages 到 pm2 日志
        <span class="hint">(用于排查缓存命中问题, 平时关闭避免日志过大)</span>
      </label>
    </div>
  </div>
  <div class="card">
    <h2>新建角色</h2>
    <div class="row">
      <label style="flex:0 0 80px">username</label>
      <input type="text" id="new-username" placeholder="字母数字下划线短横，例如 xiaoyu">
    </div>
    <div class="row">
      <label style="flex:0 0 80px">配置 JSON</label>
    </div>
    <textarea id="new-config" spellcheck="false"></textarea>
    <div class="row" style="margin-top:10px; justify-content:space-between">
      <div>
        <button class="sec" onclick="loadTemplate()">插入模板</button>
        <button class="sec" onclick="importFromFile()">从 JSON 文件导入</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="onFileImport(event)">
      </div>
      <button onclick="createChar()">创建角色</button>
    </div>
  </div>

  <div id="list"></div>
</main>

<script>
const API = '';
const token = localStorage.getItem('token') || '';
const isAdmin = localStorage.getItem('isAdmin') === 'true';

if (!token) { location.replace('/'); }
if (!isAdmin) { alert('需要管理员权限'); location.replace('/'); }

function authH(extra) {
  return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function alertMsg(msg, kind) {
  const el = document.createElement('div');
  el.className = 'alert ' + (kind || 'warn');
  el.textContent = msg;
  document.getElementById('alerts').appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

const TEMPLATE = {
  name: "小雨",
  persona: {
    identity: "25 岁独立插画师，住在成都",
    personality: ["温柔", "慢热", "偶尔毒舌"],
    speaking_style: "短句为主，爱用'嗯...''诶'开头",
    interests: ["猫", "咖啡", "宫崎骏电影"],
    taboos: ["不聊政治", "不发长段鸡汤"]
  },
  schedule: {
    timezone: "Asia/Shanghai",
    online_windows: [
      { days: ["mon","tue","wed","thu","fri"], from: "19:00", to: "23:00" },
      { days: ["sat","sun"], from: "10:00", to: "23:59" }
    ]
  },
  trigger: {
    mode: "passive",
    mention_keywords: ["小雨"],
    max_replies_per_minute: 3
  },
  channels: [],
  model: {
    provider: "deepseek",
    name: "deepseek-chat",
    temperature: 0.8,
    max_context_messages: 20
  },
  budget: {
    daily_tokens: 50000,
    per_message_max_tokens: 500
  }
};

function loadTemplate() {
  document.getElementById('new-config').value = JSON.stringify(TEMPLATE, null, 2);
}
function importFromFile() { document.getElementById('import-file').click(); }
function onFileImport(ev) {
  const f = ev.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const o = JSON.parse(r.result);
      document.getElementById('new-config').value = JSON.stringify(o, null, 2);
      alertMsg('已导入 ' + f.name, 'ok');
    } catch(e) { alertMsg('JSON 解析失败：' + e.message, 'err'); }
  };
  r.readAsText(f);
  ev.target.value = '';
}
async function loadDebugStatus() {
  try {
    const r = await fetch(API + '/api/ai/config', { headers: authH() });
    const d = await r.json();
    document.getElementById('debug-toggle').checked = !!d.debug_messages;
  } catch(e) {}
}
async function toggleDebug(on) {
  try {
    const r = await fetch(API + '/api/ai/config/debug', {
      method: 'POST',
      headers: authH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ enabled: !!on })
    });
    const d = await r.json();
    if (!d.success) {
      alertMsg('切换失败: ' + (d.message || ''), 'err');
      loadDebugStatus();
      return;
    }
    alertMsg(on ? '已开启 debug, pm2 logs 可见每次调用内容' : '已关闭 debug', 'ok');
  } catch(e) { alertMsg(e.message, 'err'); }
}
async function loadKeyStatus() {
  try {
    const r = await fetch(API + '/api/ai/config', { headers: authH() });
    const d = await r.json();
    const st = document.getElementById('key-status');
    if (d.key_set) {
      st.innerHTML = '当前已配置: <code>' + escapeHtml(d.key_masked) + '</code>';
      st.style.color = '#059669';
    } else {
      st.textContent = '⚠️ 尚未配置 API Key，AI 角色不会回复。';
      st.style.color = '#b45309';
    }
  } catch(e) {
    document.getElementById('key-status').textContent = '读取失败: ' + e.message;
  }
}

async function saveKey() {
  const key = document.getElementById('key-input').value.trim();
  if (!key) return alertMsg('请先粘贴 key', 'err');
  try {
    const r = await fetch(API + '/api/ai/config/key', {
      method: 'POST',
      headers: authH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ key })
    });
    const d = await r.json();
    if (!d.success) return alertMsg('保存失败: ' + (d.message || ''), 'err');
    alertMsg('Key 已保存: ' + (d.key_masked || ''), 'ok');
    document.getElementById('key-input').value = '';
    loadKeyStatus(); loadList();
  } catch(e) { alertMsg(e.message, 'err'); }
}

async function clearKey() {
  if (!confirm('确定清空 API Key? 所有 AI 角色将立即停止回复。')) return;
  try {
    const r = await fetch(API + '/api/ai/config/key', {
      method: 'POST',
      headers: authH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ key: '' })
    });
    const d = await r.json();
    if (!d.success) return alertMsg('操作失败: ' + (d.message || ''), 'err');
    alertMsg('已清空', 'ok');
    loadKeyStatus(); loadList();
  } catch(e) { alertMsg(e.message, 'err'); }
}

async function testKey() {
  alertMsg('正在测试 ... 请等待约 3 秒', 'warn');
  try {
    const r = await fetch(API + '/api/ai/config/test-key', {
      method: 'POST', headers: authH()
    });
    const d = await r.json();
    if (!d.success) return alertMsg('连通失败: ' + (d.message || ''), 'err');
    alertMsg('✅ 连通成功, 回复="' + d.reply + '", 用时 ' + d.latency_ms + 'ms, ' + d.tokens + ' tokens', 'ok');
  } catch(e) { alertMsg('测试失败: ' + e.message, 'err'); }
}

async function loadList() {
  try {
    const r = await fetch(API + '/api/ai/characters', { headers: authH() });
    const d = await r.json();
    if (!d.success) throw new Error(d.message || 'HTTP ' + r.status);

    let status = '';
    if (!d.key_set) status = '⚠️ 未配置 .deepseek_key 文件';
    else if (!d.ai_enabled) status = '⚠️ AI 功能已禁用';
    else status = '✅ AI 就绪 · ' + d.characters.length + ' 个角色';
    document.getElementById('status').textContent = status;

    const cont = document.getElementById('list');
    cont.innerHTML = '';
    for (const c of d.characters) cont.appendChild(renderCard(c));
  } catch(e) { alertMsg('加载失败：' + e.message, 'err'); }
}

function renderCard(c) {
  const el = document.createElement('div');
  el.className = 'card';
  const avatarUrl = c.avatar ? (API + '/avatars/' + encodeURIComponent(c.avatar)) : '/images/default-avatar.svg';
  const onlineCls = c.enabled ? (c.is_online_now ? 'on' : 'off') : 'off';
  el.innerHTML =
    '<h2>' +
      '<span class="dot ' + onlineCls + '"></span>' +
      '<span class="avatar" style="background-image:url(' + avatarUrl + ')"></span>' +
      escapeHtml(c.nickname || c.username) +
      ' <span class="hint">@' + escapeHtml(c.username) + ' · id=' + c.id + '</span>' +
      ' <span class="badge' + (c.enabled ? '' : ' off') + '">' + (c.enabled ? '启用' : '停用') + '</span>' +
      ' <span class="badge">' + (c.is_online_now ? '当前在线' : '当前离线') + '</span>' +
      ' <span class="badge">今日 token: ' + (c.tokens_used_today || 0) + '</span>' +
    '</h2>' +
    '<div id="sched-ui-' + c.id + '" class="sched-card"></div>' +
    '<div id="typing-ui-' + c.id + '" class="typing-card"></div>' +
    '<div class="hint" style="margin:8px 0 4px">高级配置 (JSON, 上面 UI 改动会实时同步, 也可直接编辑):</div>' +
    '<textarea spellcheck="false" id="cfg-' + c.id + '"></textarea>' +
    '<div class="row" style="margin-top:10px">' +
      '<button onclick="saveChar(' + c.id + ')">保存配置</button>' +
      '<button class="sec" onclick="toggleChar(' + c.id + ', ' + (c.enabled ? 'false' : 'true') + ')">' + (c.enabled ? '停用' : '启用') + '</button>' +
      '<button class="ghost" onclick="uploadAvatar(' + c.id + ')">换头像</button>' +
      '<input type="file" id="av-' + c.id + '" accept="image/*" style="display:none" onchange="doUploadAvatar(' + c.id + ', event)">' +
      '<button class="ghost" onclick="testChar(' + c.id + ')">测试发言</button>' +
      '<button class="ghost" onclick="resetContext(' + c.id + ')">重置对话</button>' +
      '<button class="ghost" onclick="showLogs(' + c.id + ')">查看日志</button>' +
      '<button class="sec" onclick="exportChar(' + c.id + ')">导出 JSON</button>' +
      '<button class="danger" style="margin-left:auto" onclick="deleteChar(' + c.id + ')">删除</button>' +
    '</div>' +
    '<div id="logs-' + c.id + '"></div>';
  el.querySelector('#cfg-' + c.id).value = JSON.stringify(c.config, null, 2);
  /* 渲染 schedule / typing UI */
  renderScheduleUI(c.id);
  renderTypingUI(c.id);
  /* JSON textarea 变化时重渲染 UI */
  el.querySelector('#cfg-' + c.id).addEventListener('input', function() {
    renderScheduleUI(c.id);
    renderTypingUI(c.id);
  });
  return el;
}

/* ===== v0.5.7: Schedule 可视化 UI ===== */
const TZ_LIST = [
  'Asia/Shanghai', 'Asia/Hong_Kong', 'Asia/Tokyo', 'Asia/Singapore', 'Asia/Kolkata',
  'Europe/London', 'Europe/Paris', 'Europe/Berlin', 'Europe/Moscow',
  'America/New_York', 'America/Chicago', 'America/Los_Angeles',
  'Pacific/Auckland', 'Australia/Sydney', 'UTC'
];
const DAY_LABELS = [
  { key: 'mon', label: '一' },
  { key: 'tue', label: '二' },
  { key: 'wed', label: '三' },
  { key: 'thu', label: '四' },
  { key: 'fri', label: '五' },
  { key: 'sat', label: '六' },
  { key: 'sun', label: '日' }
];

function parseCurrentConfig(charId) {
  const ta = document.getElementById('cfg-' + charId);
  if (!ta) return null;
  try { return JSON.parse(ta.value); } catch(e) { return null; }
}
function writeCurrentConfig(charId, config) {
  const ta = document.getElementById('cfg-' + charId);
  if (ta) ta.value = JSON.stringify(config, null, 2);
}

function isScheduleOnline(schedule) {
  if (!schedule || !Array.isArray(schedule.online_windows) || !schedule.online_windows.length) return true;
  try {
    const tz = schedule.timezone || 'Asia/Shanghai';
    const now = new Date();
    const fmt = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, weekday: 'short', hour: '2-digit', minute: '2-digit', hour12: false
    });
    let wd = 'mon', hh = 0, mm = 0;
    for (const p of fmt.formatToParts(now)) {
      if (p.type === 'weekday') wd = p.value.toLowerCase().substring(0,3);
      else if (p.type === 'hour') hh = parseInt(p.value) || 0;
      else if (p.type === 'minute') mm = parseInt(p.value) || 0;
    }
    if (hh === 24) hh = 0;
    const cur = hh * 60 + mm;
    for (const w of schedule.online_windows) {
      if (w.days && Array.isArray(w.days) && !w.days.includes(wd)) continue;
      const fp = hmToMin(w.from, 0), tp = hmToMin(w.to, 24 * 60);
      if (tp >= fp) { if (cur >= fp && cur < tp) return true; }
      else { if (cur >= fp || cur < tp) return true; }
    }
    return false;
  } catch(e) { return false; }
}
function hmToMin(s, dft) {
  if (!s || typeof s !== 'string') return dft;
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return dft;
  return (parseInt(m[1]) || 0) * 60 + (parseInt(m[2]) || 0);
}

function renderScheduleUI(charId) {
  const host = document.getElementById('sched-ui-' + charId);
  if (!host) return;
  const config = parseCurrentConfig(charId);
  if (!config) {
    host.innerHTML = '<div class="hint" style="color:#c33">⚠️ JSON 解析错误, 修好后这里会刷新</div>';
    return;
  }
  if (!config.schedule || typeof config.schedule !== 'object') config.schedule = { timezone: 'Asia/Shanghai', online_windows: [] };
  if (!Array.isArray(config.schedule.online_windows)) config.schedule.online_windows = [];
  const sch = config.schedule;

  const isOn = isScheduleOnline(sch);
  const onBadge = isOn
    ? '<span class="sched-on-now">🟢 现在: 在线</span>'
    : '<span class="sched-off-now">⚫ 现在: 离线</span>';

  const tzOpts = TZ_LIST.map(tz => '<option value="' + tz + '"' + (sch.timezone === tz ? ' selected' : '') + '>' + tz + '</option>').join('');

  let html = '<h3>📅 在线时段 ' + onBadge + '</h3>';
  html += '<div class="sched-tz"><span>时区:</span><select onchange="updateSchedTz(' + charId + ', this.value)">' + tzOpts + '</select></div>';

  if (!sch.online_windows.length) {
    html += '<div class="hint">(没有配置时段 = 永远在线)</div>';
  } else {
    sch.online_windows.forEach((w, idx) => {
      const days = Array.isArray(w.days) ? w.days : [];
      const dayBtns = DAY_LABELS.map(d =>
        '<span class="sched-day ' + (days.includes(d.key) ? 'on' : '') + '" onclick="toggleSchedDay(' + charId + ', ' + idx + ', \'' + d.key + '\')">' + d.label + '</span>'
      ).join('');
      html += '<div class="sched-win">' +
        '<div class="sched-days">' + dayBtns + '</div>' +
        '<div class="sched-time">从' +
          '<input type="time" value="' + escapeHtml(w.from || '09:00') + '" onchange="updateSchedTime(' + charId + ', ' + idx + ', \'from\', this.value)">' +
          '到' +
          '<input type="time" value="' + escapeHtml(w.to || '23:00') + '" onchange="updateSchedTime(' + charId + ', ' + idx + ', \'to\', this.value)">' +
        '</div>' +
        '<button class="sched-del" title="删除此时段" onclick="removeSchedWin(' + charId + ', ' + idx + ')">✕</button>' +
      '</div>';
    });
  }
  html += '<button class="sched-add" onclick="addSchedWin(' + charId + ')">+ 添加时段</button>';
  html += '<div class="sched-hint">时段内视为"在线". 结束<开始可跨午夜 (如 22:00→02:00). 改完别忘点"保存配置".</div>';

  host.innerHTML = html;
}

function updateSchedTz(charId, tz) {
  const cfg = parseCurrentConfig(charId);
  if (!cfg) return;
  if (!cfg.schedule) cfg.schedule = { timezone: tz, online_windows: [] };
  cfg.schedule.timezone = tz;
  writeCurrentConfig(charId, cfg);
  renderScheduleUI(charId);
}
function toggleSchedDay(charId, idx, dayKey) {
  const cfg = parseCurrentConfig(charId);
  if (!cfg || !cfg.schedule || !Array.isArray(cfg.schedule.online_windows)) return;
  const w = cfg.schedule.online_windows[idx];
  if (!w) return;
  if (!Array.isArray(w.days)) w.days = [];
  const i = w.days.indexOf(dayKey);
  if (i >= 0) w.days.splice(i, 1); else w.days.push(dayKey);
  const order = DAY_LABELS.map(d => d.key);
  w.days.sort((a, b) => order.indexOf(a) - order.indexOf(b));
  writeCurrentConfig(charId, cfg);
  renderScheduleUI(charId);
}
function updateSchedTime(charId, idx, field, val) {
  const cfg = parseCurrentConfig(charId);
  if (!cfg || !cfg.schedule || !Array.isArray(cfg.schedule.online_windows)) return;
  const w = cfg.schedule.online_windows[idx];
  if (!w) return;
  w[field] = val;
  writeCurrentConfig(charId, cfg);
  renderScheduleUI(charId);
}
function removeSchedWin(charId, idx) {
  const cfg = parseCurrentConfig(charId);
  if (!cfg || !cfg.schedule || !Array.isArray(cfg.schedule.online_windows)) return;
  cfg.schedule.online_windows.splice(idx, 1);
  writeCurrentConfig(charId, cfg);
  renderScheduleUI(charId);
}
function addSchedWin(charId) {
  const cfg = parseCurrentConfig(charId);
  if (!cfg) return;
  if (!cfg.schedule) cfg.schedule = { timezone: 'Asia/Shanghai', online_windows: [] };
  if (!Array.isArray(cfg.schedule.online_windows)) cfg.schedule.online_windows = [];
  cfg.schedule.online_windows.push({ days: ['mon','tue','wed','thu','fri'], from: '19:00', to: '23:00' });
  writeCurrentConfig(charId, cfg);
  renderScheduleUI(charId);
}

/* ===== v0.5.7: Typing behavior 可视化 UI ===== */
function renderTypingUI(charId) {
  const host = document.getElementById('typing-ui-' + charId);
  if (!host) return;
  const config = parseCurrentConfig(charId);
  if (!config) { host.innerHTML = ''; return; }
  if (!config.typing_behavior || typeof config.typing_behavior !== 'object') {
    config.typing_behavior = {
      thinking_delay_sec: [0.5, 2],
      typing_speed_cps: [10, 20],
      max_total_delay_sec: 15,
      show_typing_indicator: true
    };
    writeCurrentConfig(charId, config);
  }
  const tb = config.typing_behavior;
  const tMin = (Array.isArray(tb.thinking_delay_sec) ? tb.thinking_delay_sec[0] : 0.5);
  const tMax = (Array.isArray(tb.thinking_delay_sec) ? tb.thinking_delay_sec[1] : 2);
  const sMin = (Array.isArray(tb.typing_speed_cps) ? tb.typing_speed_cps[0] : 10);
  const sMax = (Array.isArray(tb.typing_speed_cps) ? tb.typing_speed_cps[1] : 20);
  const maxT = tb.max_total_delay_sec || 15;
  const show = tb.show_typing_indicator !== false;

  let html = '<h3>⌨️ 打字行为 (模拟真人)</h3>';
  html += '<div class="typing-row"><label>思考时间 (秒)</label>' +
    '<input type="number" step="0.1" min="0" value="' + tMin + '" onchange="updateTyping(' + charId + ', \'tMin\', this.value)">' +
    '<span class="sep">~</span>' +
    '<input type="number" step="0.1" min="0" value="' + tMax + '" onchange="updateTyping(' + charId + ', \'tMax\', this.value)"></div>';
  html += '<div class="typing-row"><label>打字速度 (字/秒)</label>' +
    '<input type="number" step="1" min="1" value="' + sMin + '" onchange="updateTyping(' + charId + ', \'sMin\', this.value)">' +
    '<span class="sep">~</span>' +
    '<input type="number" step="1" min="1" value="' + sMax + '" onchange="updateTyping(' + charId + ', \'sMax\', this.value)"></div>';
  html += '<div class="typing-row"><label>总延迟上限 (秒)</label>' +
    '<input type="number" step="1" min="1" max="60" value="' + maxT + '" onchange="updateTyping(' + charId + ', \'maxT\', this.value)"></div>';
  html += '<div class="typing-row"><label><input type="checkbox"' + (show ? ' checked' : '') + ' onchange="updateTyping(' + charId + ', \'show\', this.checked)"> 显示"正在输入…"气泡</label></div>';
  html += '<div class="sched-hint">举例: 思考 0.5~2s + 打字速度 10~20字/秒. 50 字回复 ≈ 3~7 秒. 距上次发言 > 10 分钟会额外 +2~5 秒 (冷启动).</div>';

  host.innerHTML = html;
}

function updateTyping(charId, field, val) {
  const cfg = parseCurrentConfig(charId);
  if (!cfg) return;
  if (!cfg.typing_behavior) cfg.typing_behavior = {};
  const tb = cfg.typing_behavior;
  if (!Array.isArray(tb.thinking_delay_sec)) tb.thinking_delay_sec = [0.5, 2];
  if (!Array.isArray(tb.typing_speed_cps)) tb.typing_speed_cps = [10, 20];
  if (field === 'tMin') tb.thinking_delay_sec[0] = parseFloat(val) || 0;
  else if (field === 'tMax') tb.thinking_delay_sec[1] = parseFloat(val) || 0;
  else if (field === 'sMin') tb.typing_speed_cps[0] = parseInt(val) || 1;
  else if (field === 'sMax') tb.typing_speed_cps[1] = parseInt(val) || 1;
  else if (field === 'maxT') tb.max_total_delay_sec = parseInt(val) || 15;
  else if (field === 'show') tb.show_typing_indicator = !!val;
  writeCurrentConfig(charId, cfg);
}

async function createChar() {
  const username = document.getElementById('new-username').value.trim();
  const raw = document.getElementById('new-config').value.trim();
  if (!username) return alertMsg('请填 username', 'err');
  let config;
  try { config = JSON.parse(raw); } catch(e) { return alertMsg('JSON 解析失败：' + e.message, 'err'); }
  try {
    const r = await fetch(API + '/api/ai/characters', {
      method: 'POST',
      headers: authH({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ username, config })
    });
    const d = await r.json();
    if (!d.success) return alertMsg('创建失败：' + (d.message || ''), 'err');
    alertMsg('创建成功', 'ok');
    document.getElementById('new-username').value = '';
    document.getElementById('new-config').value = '';
    loadList();
  } catch(e) { alertMsg('创建失败：' + e.message, 'err'); }
}

async function resetContext(id) {

      method: 'POST', headers: authH()
    });
    const d = await r.json();
    if (!d.success) return alertMsg('重置失败: ' + (d.message || ''), 'err');
    alertMsg('已重置, window_start=' + d.window_start, 'ok');
  } catch(e) { alertMsg(e.message, 'err'); }
}

async function showLogs(id) {
  try {
    const r = await fetch(API + '/api/ai/characters/' + id + '/logs?limit=30', { headers: authH() });
    const d = await r.json();
    const cont = document.getElementById('logs-' + id);
    if (!d.success || !d.logs.length) { cont.innerHTML = '<div class="hint" style="margin-top:10px">暂无日志</div>'; return; }
    const html = ['<div class="logs" style="margin-top:10px">'];
   for (const l of d.logs) {
      const cls = l.error ? 'l err' : 'l';
      const hit = l.cache_hit_tokens || 0;
      const miss = l.cache_miss_tokens || 0;
      let tokStr;
      if (hit > 0 || miss > 0) {
        const pct = hit + miss > 0 ? Math.round(hit * 100 / (hit + miss)) : 0;
        tokStr = 'in=' + (l.input_tokens || 0) + ' (hit=' + hit + ' miss=' + miss + ' ' + pct + '%) out=' + (l.output_tokens || 0);
      } else {
        tokStr = 'in=' + (l.input_tokens || 0) + ' out=' + (l.output_tokens || 0);
      }
      const parts = [
        '#' + l.id,
        l.created_at,
        l.trigger_type || '-',
        tokStr,
        l.latency_ms + 'ms',
        l.error ? ('ERR: ' + l.error) : ('msg=' + (l.output_msg_id || '-'))
      ];
      html.push('<span class="' + cls + '">' + escapeHtml(parts.join(' · ')) + '</span>');
    }
    html.push('</div>');
    cont.innerHTML = html.join('');
  } catch(e) { alertMsg(e.message, 'err'); }
}

function exportChar(id) {
  const raw = document.getElementById('cfg-' + id).value;
  const blob = new Blob([raw], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ai-character-' + id + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
